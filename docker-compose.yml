services:
  app:
    build: .
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    expose:
      - "3000"

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  redis-data:
