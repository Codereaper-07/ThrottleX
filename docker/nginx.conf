server {
    listen 80;

    # Prometheus scrapes app:3000/metrics directly over the internal Docker
    # network (see prometheus/prometheus.yml) and never goes through Nginx,
    # so blocking it here only affects external clients — scraping is
    # unaffected. Metrics can reveal internal traffic/error-rate details,
    # so they shouldn't be reachable from outside the Docker network.
    location /metrics {
        deny all;
        return 403;
    }

    location / {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
